version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - securite-net
    depends_on:
      - minio
      - apis-container
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio/data:/data
    networks:
      - securite-net
    restart: unless-stopped

  apis-container:
    build: ./apis
    image: apis-server
    container_name: apis-container
    ports:
      - "8080:8080"
    volumes:
      - ./apis/updater.db:/app/updater.db
    command: ./apis
    networks:
      - securite-net
    restart: unless-stopped

networks:
  securite-net:
    name: securite-net
    driver: bridge
