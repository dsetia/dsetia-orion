version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl
    networks:
      - securite-net
    depends_on:
      - minio
      - apis-container
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio/data:/data
    networks:
      - securite-net
    restart: unless-stopped

  apis-container:
    build:
      context: .
      dockerfile: apis/Dockerfile
    image: apis-server
    container_name: apis-container
    ports:
      - "8080:8080"
    volumes:
      - ./config/apis_config.json:/app/config.json
    command: ./apis
    networks:
      - securite-net
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: pgdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - securite-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  securite-net:
    name: securite-net
    driver: bridge
