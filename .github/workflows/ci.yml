name: Full Stack Sanity Tests

on:
  push:
    branches:
      - master
    paths:
      - 'apis/**'
      - 'config/**'
      - 'provisioner/**'
      - 'db/dbtool.go'
      - 'docker-compose.yml'
      - 'nginx/nginx.conf'
      - 'run_test.sh'
      - 'init_db.sh'
      - 'populate_db.sh'
      - 'populate_minio.sh'
      - 'updater/**'
      - 'utils/**'
  pull_request:
    branches:
      - master
    paths:
      - 'apis/**'
      - 'config/**'
      - 'provisioner/**'
      - 'db/dbtool.go'
      - 'docker-compose.yml'
      - 'nginx/nginx.conf'
      - 'run_test.sh'
      - 'init_db.sh'
      - 'populate_db.sh'
      - 'populate_minio.sh'
      - 'updater/**'
      - 'utils/**'
  workflow_dispatch:

jobs:
  cloud-side-tests:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker environment
        uses: docker/setup-buildx-action@v3

      - name: Ensure latest Docker Compose
        run: |
          sudo rm -f /usr/local/bin/docker-compose
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
          docker compose version
          sudo usermod -aG docker $USER

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'  # Verify with updater/go.mod

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends postgresql-client

      - name: Verify psql installation
        run: psql --version

      # Install dependencies
      - name: Build Go binaries
        working-directory: .
        run: |
          make all
          make install
          make install-utils
          make config

      - name: Install mc
        run: |
          wget https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/

      # Run sanity tests
      - name: Run sanity tests
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 10
          # init and populate DB from outside the docker network
          init_db.sh config/db_dev.json db/schema_pg_v2.sql <<< "y"
          populate_db.sh config/db_dev.json <<< "y"
          init_minio.sh config/minio.json <<< "y"
          populate_minio.sh config/db_dev.json config/minio.json minio <<< "y"
          ./run_test.sh

      # Upload test log for debugging
      - name: Upload cloud-side test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-log
          path: test.log

  updater-tests:
    runs-on: ubuntu-latest
    needs: cloud-side-tests  # Run only if cloud-side-tests succeed

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker environment
        uses: docker/setup-buildx-action@v3

      - name: Ensure latest Docker Compose
        run: |
          sudo rm -f /usr/local/bin/docker-compose
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
          docker compose version
          sudo usermod -aG docker $USER

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends postgresql-client

      - name: Verify psql installation
        run: psql --version

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # Install dependencies
      - name: Build Go binaries
        working-directory: .
        run: |
          make all
          make install
          make install-utils
          make config

      - name: Install mc
        run: |
          wget https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends postgresql-client

      - name: Verify psql installation
        run: psql --version

      # start elastic container
      - name: Start elastic container
        run: |
          mkdir -p provisioner/test_logs/certs
          docker rm -f es01 || true
          docker run -d --name es01 --net host -p 9200:9200 docker.elastic.co/elasticsearch/elasticsearch:9.0.3
          echo "Waiting for Elasticsearch to stabilize..."
          sleep 120

      # Fetch elastic certificate
      - name: Fetch elastic certificate
        run: |
          echo | openssl s_client -showcerts -servername localhost -connect localhost:9200 > elastic.pem
          if [ ! -s elastic.pem ]; then
            echo "Error: Failed to fetch certificate"
            exit 1
          fi

      # Fetch elastic password
      - name: Fetch elastic password, id and key
        run: |
          elastic_key.sh

      # Copy certificate
      - name: Copy certificate
        run: |
          cp elastic.pem filebeat.yml provisioner/

      # Start backend containers
      - name: Start backend containers
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 10
          # init and populate DB from outside the docker network
          init_db.sh config/db_dev.json db/schema_pg_v2.sql <<< "y"
          populate_db.sh config/db_dev.json <<< "y"
          init_minio.sh config/minio.json <<< "y"
          populate_minio.sh config/db_dev.json config/minio.json minio <<< "y"

      # Build provisioner tarball
      - name: Build provisioner tarball
        run: |
          # sensor to connect with dev docker cloud; provisioning DB access via localhost
          OUTPUT=$(provisioner -config=config/provisioner/provision-dev-config.json -db=config/db_dev.json -op provision-tenant -tenant-name "tenant1")
          ODEVID=$(provisioner -config=config/provisioner/provision-dev-config.json -db=config/db_dev.json -op provision-sensor -tenant-name "tenant1" --device-name "Device 1" -minio=config/minio.json)
          TENANT_ID=$(echo "$OUTPUT" | grep -oE 'ID=[0-9]+' | cut -d= -f2)
          DEVICE_ID=$(echo "$ODEVID" | grep -oE 'device=[a-zA-Z0-9-]+' | cut -d= -f2)
          create-tarball.sh sensor config $TENANT_ID $DEVICE_ID
          curl -k https://localhost/v1/$TENANT_ID/$DEVICE_ID/sensor-provision.tar.gz -o provisioner/sensor-provision.tar.gz
          # Populate rules file in the new name format
          TEST_FILE_RULES=hndr-rules-tid_$TENANT_ID-r1.2.3.tar.gz
          cp  minio/hndr-rules-r1.2.3.tar.gz /tmp/$TEST_FILE_RULES
          objupdater -type rules -dbconfig config/db_dev.json -minioconfig config/minio.json -file /tmp/$TEST_FILE_RULES -tenantid $TENANT_ID

      # Build sensor image
      - name: Build sensor image
        working-directory: ./provisioner
        run: |
          docker build -f Dockerfile.sensor -t sensor:latest .

      # Run updater tests
      - name: Run updater tests
        run: |
          mkdir -p test_logs/securite/suricata test_logs/securite/updater
          docker run --name sensor \
            --network host \
            -v "$(pwd)/test_logs/securite/suricata:/var/log/securite/suricata" \
            -v "$(pwd)/test_logs/securite/updater:/var/log/securite/updater" \
            -d sensor:latest
          # Wait for sensor to stabilize
          sleep 120
          # Validate sensor logs
          docker logs sensor > test_logs/sensor.log
          grep "Sensor initialization complete" test_logs/sensor.log
          grep "hndr entered RUNNING state" test_logs/sensor.log
          grep "updater entered RUNNING state" test_logs/sensor.log
          # Validate suricata logs
          cat test_logs/securite/suricata/suricata.log | grep "Hello World"
          # Validate updater logs
          cat test_logs/securite/updater/updater.log | grep "Status update sent successfully"
          # Check for 404 Not Found errors in updater logs
          echo "Checking for 404 Not Found errors in updater logs..."
          if grep -i "404 Not Found" test_logs/securite/updater/updater.log; then
            echo "ERROR: Found '404 Not Found' errors in updater.log"
            exit 1
          else
            echo "No '404 Not Found' errors found in updater.log"
          fi

      # Clean up
      - name: Clean up
        if: always()
        run: |
          docker compose -f docker-compose.yml down -v
          docker rm -f sensor || true
          docker rm -f es01 || true

      # Upload test logs for debugging
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: updater-test-logs
          path: test_logs/

      # Show Docker logs on failure
      - name: Show Docker logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml logs
          docker logs sensor || true

