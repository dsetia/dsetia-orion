name: Full Stack Sanity Tests

on:
  push:
    branches:
      - master
    paths:
      - 'apis/**'
      - 'config/**'
      - 'provisioner/**'
      - 'db/dbtool.go'
      - 'docker-compose.yml'
      - 'nginx/nginx.conf'
      - 'run_test.sh'
      - 'init_db.sh'
      - 'populate_db.sh'
      - 'populate_minio.sh'
      - 'updater/**'
  pull_request:
    branches:
      - master
    paths:
      - 'apis/**'
      - 'config/**'
      - 'provisioner/**'
      - 'db/dbtool.go'
      - 'docker-compose.yml'
      - 'nginx/nginx.conf'
      - 'run_test.sh'
      - 'init_db.sh'
      - 'populate_db.sh'
      - 'populate_minio.sh'
      - 'updater/**'
  workflow_dispatch:

jobs:
  cloud-side-tests:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Docker
      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get remove -y docker docker-engine docker.io containerd runc || true
          sudo apt-get install -y ca-certificates curl gnupg lsb-release
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker $USER

      # Install Docker Compose
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.19'  # Verify with updater/go.mod

      # Install dependencies
      - name: Build Go binaries
        working-directory: .
        run: |
          make all
          make install

      - name: Install mc
        run: |
          wget https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/

      # Run sanity tests
      - name: Run sanity tests
        run: |
          docker-compose -f docker-compose.yml up -d
          sleep 10
          # init and populate DB from outside the docker network
          ./init_db.sh config/db_dev_config.json <<< "y"
          ./populate_db.sh config/db_dev_config.json <<< "y"
          ./init_minio.sh config/minio_config.json <<< "y"
          ./populate_minio.sh config/db_dev_config.json config/minio_config.json <<< "y"
          ./run_test.sh

      # Upload test log for debugging
      - name: Upload cloud-side test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-log
          path: test.log

  updater-tests:
    runs-on: ubuntu-latest
    needs: cloud-side-tests  # Run only if cloud-side-tests succeed

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Docker
      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get remove -y docker docker-engine docker.io containerd runc || true
          sudo apt-get install -y ca-certificates curl gnupg lsb-release
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker $USER

      # Install Docker Compose
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.19'

      # Install dependencies
      - name: Build Go binaries
        working-directory: .
        run: |
          make all
          make install

      - name: Install mc
        run: |
          wget https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/

      # Start backend containers
      - name: Start backend containers
        run: |
          docker-compose -f docker-compose.yml up -d
          sleep 10
          # init and populate DB from outside the docker network
          ./init_db.sh config/db_dev_config.json <<< "y"
          ./populate_db.sh config/db_dev_config.json <<< "y"
          ./init_minio.sh config/minio_config.json <<< "y"
          ./populate_minio.sh config/db_dev_config.json config/minio_config.json <<< "y"

      # Build provisioner tarball
      - name: Build provisioner tarball
        working-directory: ./provisioner
        run: |
          # sensor to connect with dev docker cloud; provisioning DB access via localhost
          provisioner -config=./config/provision-dev-config.json -db=../config/db_dev_config.json -op provision-tenant -tenant-name "tenant1"
          provisioner -config=./config/provision-dev-config.json -db=../config/db_dev_config.json -op provision-sensor -tenant-name "tenant1" --device-name "Device 1" -minio=../config/minio_config.json
          ./create-tarball.sh provisioner
          mc cp package.tar.gz myminio/provisioner/package.tar.gz
          mc cp myminio/config/1/sensor-config.json .
          ./create-tarball.sh sensor 1
          mc cp sensor-provision.tar.gz myminio/sensor/1/sensor-provision.tar.gz

      # Build sensor image
      - name: Build sensor image
        working-directory: ./provisioner
        run: |
          mc cp myminio/sensor/1/sensor-provision.tar.gz .
          docker build -f Dockerfile.sensor -t sensor:latest .

      # Run updater tests
      - name: Run updater tests
        run: |
          mkdir -p test_logs/suricata test_logs/updater
          docker run --name sensor \
            --network host \
            -v "$(pwd)/test_logs/suricata:/var/log/suricata" \
            -v "$(pwd)/test_logs/updater:/var/log/updater" \
            -d sensor:latest
          # Wait for sensor to stabilize
          sleep 20
          # Validate sensor logs
          docker logs sensor > test_logs/sensor.log
          grep "Sensor initialization complete" test_logs/sensor.log
          grep "hndr entered RUNNING state" test_logs/sensor.log
          grep "updater entered RUNNING state" test_logs/sensor.log
          # Validate suricata logs
          cat test_logs/suricata/suricata.log | grep "Hello World"
          # Validate updater logs
          cat test_logs/updater/updater.log | grep "Status update sent successfully"
          # Check for 404 Not Found errors in updater logs
          echo "Checking for 404 Not Found errors in updater logs..."
          if grep -i "404 Not Found" test_logs/updater/updater.log; then
            echo "ERROR: Found '404 Not Found' errors in updater.log"
            exit 1
          else
            echo "No '404 Not Found' errors found in updater.log"
          fi

      # Clean up
      - name: Clean up
        if: always()
        run: |
          docker-compose -f docker-compose.yml down -v
          docker rm -f sensor || true

      # Upload test logs for debugging
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: updater-test-logs
          path: test_logs/

      # Show Docker logs on failure
      - name: Show Docker logs on failure
        if: failure()
        run: |
          docker-compose -f docker-compose.yml logs
          docker logs sensor || true

