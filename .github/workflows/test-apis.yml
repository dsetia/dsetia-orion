name: Test APIs

# Trigger the workflow on push or pull request events for the main branch
on:
  push:
    branches:
      - master
    paths:
      - 'apis/apis.go'
      - 'apis/apis_test.go'
      - 'apis/dbutil.go'
  pull_request:
    branches:
      - master
    paths:
      - 'apis/apis.go'
      - 'apis/apis_test.go'
      - 'apis/dbutil.go'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.19'  # Matching our Dockerfile's Go version

      # Install dependencies
      - name: Install dependencies
        working-directory: ./apis
        run: go mod download

      # Run tests with coverage
      - name: Run tests with coverage
        working-directory: ./apis
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apis/coverage.out

      # Optional: Cache Go modules for faster future runs
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
