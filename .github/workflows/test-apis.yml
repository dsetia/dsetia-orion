name: Test APIs

# Trigger the workflow on push or pull request events for the main branch
on:
  push:
    branches:
      - master
    paths:
      - 'apis/apis.go'
      - 'apis/apis_test.go'
      - 'apis/dbutil.go'
  pull_request:
    branches:
      - master
    paths:
      - 'apis/apis.go'
      - 'apis/apis_test.go'
      - 'apis/dbutil.go'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14 # Match your production version (e.g., 14, adjust as needed)
        env:
          POSTGRES_USER: pguser
          POSTGRES_PASSWORD: pgpass
          POSTGRES_DB: pgdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'  # Matching our Dockerfile's Go version

      # Install dependencies
      - name: Install dependencies
        working-directory: ./apis
        run: go mod download

      # Create test database
      - name: Create test database
        env:
          PGPASSWORD: pgpass
        run: |
          psql -h localhost -p 5432 -U pguser -d pgdb -c "CREATE DATABASE testdb;"

      # Run tests with coverage
      - name: Run tests with coverage for apis
        working-directory: ./apis
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage for apis
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-apis
          path: apis/coverage.out

      # Run DB tests with coverage
      - name: Run DB tests with coverage for db
        working-directory: ./db
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage for db
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-db
          path: db/coverage.out

      # Optional: Cache Go modules for faster future runs
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
