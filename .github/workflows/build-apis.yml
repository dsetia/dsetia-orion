name: Docker Image CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'apis/apis.go'
      - 'apis/dbutil.go'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'apis/apis.go'
      - 'apis/dbutil.go'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      uses: docker/build-push-action@v5
      with:
          context: ./apis
          file: ./apis/Dockerfile
          push: false # Set to true to push the image to a registry
          tags: apis-server:latest
