events {
    worker_connections 1024;
}

http {
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'upstream_status=$upstream_status '
                       'auth_status=$auth_status '
                       'x_api_key=$http_x_api_key '
                       'x_device_id=$http_x_device_id';

    server {
        listen 80;
        log_subrequest on;
        access_log /dev/stdout detailed;

        location ~ ^/v1/download/(\d+)/ {
            set $tenant_id $1;
            auth_request /auth;
            auth_request_set $auth_status $upstream_status;
            access_log /var/log/nginx/download.log detailed;

            error_page 401 = @error401;

            rewrite ^/v1/download/(\d+)/(.*)$ /$2 break;
            proxy_pass http://minio:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-API-KEY $http_X_API_KEY;
            proxy_set_header X-DEVICE-ID $http_X_DEVICE_ID;
        }
	location @error401 {
            return 401 "Unauthorized - Auth Status: $auth_status\n";
        }

        location = /auth {
            internal;
            rewrite ^ /v1/authenticate/$tenant_id break;
            proxy_pass http://apis-container:8080;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-API-KEY $http_X_API_KEY;
            proxy_set_header X-DEVICE-ID $http_X_DEVICE_ID;
            access_log /var/log/nginx/auth_access.log detailed;
        }

        location /v1/ {
            proxy_pass http://apis-container:8080/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log /var/log/nginx/v1.log detailed;
        }
    }
}
